    <style>
        :root {
            --dark: #1a1818;
            --mid: #5a524a;
            --light: #9a908a;
            --paper: #f5f2ed;
            --border: #e0dbd2;
            --white: #ffffff;
            --c-public: #4a7ab5;
            --c-industrial: #b8743a;
            --c-soe: #7c5cbf;
            --c-other: #9a908a;
        }

        html,
        body {
            height: 100%;
            margin: 0;
        }

        body {
            font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
            background: var(--paper);
            color: var(--dark);
            -webkit-font-smoothing: antialiased;
        }

        .font-display {
            font-family: 'Cormorant Garamond', Georgia, serif;
        }

        /* Tender card */
        .tender-card {
            transition: box-shadow 0.15s ease;
        }

        .tender-card:hover {
            box-shadow: 0 6px 28px rgba(26, 24, 24, 0.09);
        }

        /* Sector left border */
        .sector-public {
            border-left: 3px solid var(--c-public);
        }

        .sector-industrial {
            border-left: 3px solid var(--c-industrial);
        }

        .sector-soe {
            border-left: 3px solid var(--c-soe);
        }

        .sector-other {
            border-left: 3px solid var(--c-other);
        }

        /* Sidebar date items */
        .sidebar-item {
            display: block;
            width: 100%;
            text-align: left;
            padding: 7px 10px;
            font-size: 11px;
            letter-spacing: 0.04em;
            margin-bottom: 2px;
            border: none;
            background: none;
            transition: background 0.12s ease, color 0.12s ease;
            color: var(--mid);
            cursor: pointer;
        }

        .sidebar-item.active {
            background: var(--dark);
            color: var(--white);
        }

        .sidebar-item:not(.active):hover {
            background: var(--border);
            color: var(--dark);
        }

        /* Filter tabs */
        .filter-tab {
            cursor: pointer;
            border: none;
            background: none;
            padding: 0 0 12px 0;
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            border-bottom: 2px solid transparent;
            transition: color 0.12s ease, border-color 0.12s ease;
            color: var(--light);
            white-space: nowrap;
        }

        .filter-tab.active {
            color: var(--dark);
            border-bottom-color: var(--dark);
        }

        .filter-tab:not(.active):hover {
            color: var(--mid);
        }

        /* CTA outlined button */
        .btn-open {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border: 1px solid var(--dark);
            color: var(--dark);
            font-size: 10px;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            white-space: nowrap;
            flex-shrink: 0;
            transition: background 0.12s ease, color 0.12s ease;
        }

        .btn-open:hover {
            background: var(--dark);
            color: var(--white);
        }

        /* Loading spinner */
        @keyframes _spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spin {
            animation: _spin 0.75s linear infinite;
        }

        /* Keyword highlight */
        mark {
            background: #ede3cf;
            color: var(--dark);
            border-radius: 1px;
            padding: 0 1px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 3px;
            height: 3px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 9999px;
        }

        /* Search */
        #search-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        #search-input:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.4) !important;
        }

        /* Responsive */
        @media (max-width: 1023px) {
            .sidebar-hide {
                display: none !important;
            }
        }

        @media (min-width: 640px) {
            .sm-show {
                display: block !important;
            }
        }

        @media (min-width: 1024px) {
            .lg-hide {
                display: none !important;
            }
        }
    </style>
</head>

        /* ── App state ───────────────────────────────────── */
        let activeTenders = INIT_REPORT.tenders || [];
        let activeFilter = 'all';
        let searchQuery = '';

        /* ── DOM refs ────────────────────────────────────── */
        const $ = id => document.getElementById(id);
        const sidebarNav = $('sidebar-nav');
        const mobileSelect = $('mobile-date-select');
        const searchInput = $('search-input');
        const tendersContainer = $('tenders-container');
        const loadingState = $('loading-state');
        const emptyState = $('empty-state');

        /* ── Bootstrap ───────────────────────────────────── */
        document.addEventListener('DOMContentLoaded', () => {
            buildSidebar();
            buildMobileSelect();
            bindFilterTabs();
            searchInput.addEventListener('input', e => {
                searchQuery = e.target.value.trim().toLowerCase();
                renderTenders();
            });
            mobileSelect.addEventListener('change', e => loadReport(e.target.value));
            renderAll();
        });

        /* ── Sidebar ─────────────────────────────────────── */
        function buildSidebar() {
            MANIFEST.forEach((item, i) => {
                const btn = document.createElement('button');
                btn.className = `sidebar-item${i === 0 ? ' active' : ''}`;
                btn.textContent = fmtDateSidebar(item.date);
                btn.dataset.file = item.file;
                btn.addEventListener('click', () => loadReport(item.file));
                sidebarNav.appendChild(btn);
            });
        }

        /* ── Mobile <select> ─────────────────────────────── */
        function buildMobileSelect() {
            MANIFEST.forEach((item, i) => {
                const opt = new Option(item.date, item.file, i === 0, i === 0);
                mobileSelect.appendChild(opt);
            });
        }

        /* ── Filter tabs ─────────────────────────────────── */
        function bindFilterTabs() {
            document.querySelectorAll('.filter-tab').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeFilter = btn.dataset.sector;
                    renderTenders();
                });
            });
        }

        /* ── Async report loader ─────────────────────────── */
        async function loadReport(file) {
            document.querySelectorAll('.sidebar-item').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.file === file);
            });
            mobileSelect.value = file;

            loadingState.style.display = 'flex';
            tendersContainer.innerHTML = '';
            emptyState.style.display = 'none';

            try {
                let report;
                if (file === MANIFEST[0].file) {
                    // Always use the server-side injected data for the latest report —
                    // avoids serving a stale cached JSON that may be missing new fields.
                    report = INIT_REPORT;
                } else {
                    const resp = await fetch(file);
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                    report = await resp.json();
                }
                activeTenders = report.tenders || [];
                $('header-date').textContent = `Raport: ${report.date}`;
                renderAll();
            } catch (err) {
                console.error('Failed to load report:', err);
                tendersContainer.innerHTML =
                    `<div style="text-align:center;font-size:12px;color:#b91c1c;padding:40px 0;">Błąd ładowania raportu.</div>`;
            } finally {
                loadingState.style.display = 'none';
            }
        }

        /* ── Render pipeline ─────────────────────────────── */
        function renderAll() { updateStats(); renderTenders(); }

        function updateStats() {
            const c = { all: 0, public: 0, industrial: 0, soe: 0, other: 0 };
            activeTenders.forEach(t => {
                c.all++;
                const s = t.sector || 'other';
                c[s] = (c[s] || 0) + 1;
            });
            $('stat-all').textContent = c.all;
            $('stat-public').textContent = c.public || 0;
            $('stat-industrial').textContent = c.industrial || 0;
            $('stat-soe').textContent = c.soe || 0;

            $('tab-all').textContent = `(${c.all})`;
            $('tab-public').textContent = `(${c.public || 0})`;
            $('tab-industrial').textContent = `(${c.industrial || 0})`;
            $('tab-soe').textContent = `(${c.soe || 0})`;
            $('tab-other').textContent = `(${c.other || 0})`;
        }

        function filteredTenders() {
            return activeTenders.filter(t => {
                if (activeFilter !== 'all' && (t.sector || 'other') !== activeFilter) return false;
                if (searchQuery) {
                    const hay = `${t.title || ''} ${t.entity || ''}`.toLowerCase();
                    if (!hay.includes(searchQuery)) return false;
                }
                return true;
            });
        }

        function renderTenders() {
            const list = filteredTenders();
            $('header-count').textContent = `${list.length} wynik${pl(list.length)}`;

            if (list.length === 0) {
                tendersContainer.innerHTML = '';
                emptyState.style.display = 'flex';
                return;
            }
            emptyState.style.display = 'none';
            tendersContainer.innerHTML = list.map(tenderCard).join('');
        }

        /* ── Sector config ───────────────────────────────── */
        const SECTORS = {
            public: { label: 'Publiczny', cls: 'sector-public', color: 'var(--c-public)' },
            industrial: { label: 'Przemysłowy', cls: 'sector-industrial', color: 'var(--c-industrial)' },
            soe: { label: 'SSP', cls: 'sector-soe', color: 'var(--c-soe)' },
            other: { label: 'Inne', cls: 'sector-other', color: 'var(--c-other)' },
        };

        /* ── Design-only probability badge ─────────────── */
        function designBadge(prob) {
            if (prob == null) return '';
            const pct = Math.round(prob * 100);
            let bg, fg, label;
            if (pct >= 70) {
                bg = '#dcfce7'; fg = '#166534'; label = 'Tylko projekt';
            } else if (pct >= 40) {
                bg = '#fef9c3'; fg = '#854d0e'; label = 'Możliwe: mieszany';
            } else {
                bg = '#fee2e2'; fg = '#991b1b'; label = 'Zaprojektuj i wybuduj';
            }
            return `<span title="Szacowane prawdopodobieństwo, że przetarg dotyczy wyłącznie opracowania dokumentacji projektowej (nie obejmuje realizacji budowy)" style="display:inline-flex; align-items:center; gap:4px; font-size:9px; font-weight:600; letter-spacing:0.08em; padding:2px 7px; border-radius:3px; background:${bg}; color:${fg}; cursor:default;">
  <svg width="8" height="8" viewBox="0 0 16 16" fill="${fg}"><path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1Zm.75 3.5v4.25l3 1.73-.77 1.33-3.48-2V4.5h1.25Z"/></svg>
  ${pct}%&ensp;${label}
</span>`;
        }

        /* ── Single tender card ──────────────────────────── */
        function tenderCard(t) {
            const s = SECTORS[t.sector] || SECTORS.other;
            const pub = t.publication_date ? fmtDate(t.publication_date) : '—';
            const dl = t.deadline ? fmtDate(t.deadline) : '—';
            const soon = t.deadline && deadlineSoon(t.deadline);

            const titleHtml = hl(esc(t.title || 'Brak tytułu'), searchQuery);
            const entityHtml = hl(esc(t.entity || '—'), searchQuery);
            const sourceText = esc(t.source || '—');

            return `
<article class="tender-card ${s.cls}" style="background:var(--white); padding:18px 22px 16px 20px;">
  <div style="display:flex; align-items:flex-start; gap:20px;">
    <div style="flex:1; min-width:0;">

      <!-- Meta row: sector + source + CPV -->
      <div style="display:flex; align-items:center; gap:14px; margin-bottom:9px; flex-wrap:wrap;">
        <span style="display:inline-flex; align-items:center; gap:5px; font-size:9px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:${s.color};">
          <span style="width:5px; height:5px; border-radius:50%; background:${s.color}; flex-shrink:0; display:inline-block;"></span>
          ${s.label}
        </span>
        <span style="font-size:9px; color:var(--light); letter-spacing:0.08em; text-transform:uppercase;">${sourceText}</span>
        ${t.cpv ? `<span style="font-size:9px; font-family:'Courier New',Courier,monospace; color:var(--mid); background:var(--paper); padding:1px 6px; border:1px solid var(--border);">CPV&nbsp;${esc(t.cpv)}</span>` : ''}
        ${t.procedure_type ? `<span style="font-size:9px; color:var(--light); text-transform:uppercase; letter-spacing:0.06em;">${esc(t.procedure_type)}</span>` : ''}
      </div>

      <!-- Title -->
      <h3 style="font-size:14px; font-weight:500; color:var(--dark); line-height:1.5; margin:0 0 6px; word-break:break-word;">${titleHtml}</h3>

      <!-- Entity & identifiers -->
      <p style="font-size:11px; color:var(--mid); margin:0;">
        <span style="font-weight:500;">Zamawiający:</span>
        <span style="margin-left:4px;">${entityHtml}</span>
      </p>
      ${t.proc_id ? `<p style="font-size:10px; color:var(--mid); margin:3px 0 0;">
        <span style="font-weight:500; color:var(--light);">Nr postępowania:</span>
        <span style="margin-left:4px; font-family:'Courier New',Courier,monospace; font-size:10px; color:var(--mid);">${esc(t.proc_id)}</span>
      </p>` : ''}

      <!-- Description -->
      ${t.description ? `<p style="font-size:11px; color:var(--mid); margin:6px 0 0; line-height:1.5; border-left:2px solid var(--border); padding-left:8px;">${esc(t.description)}</p>` : ''}

      <!-- Design probability badge -->
      ${t.design_probability != null ? `<div style="margin-top:8px;">${designBadge(t.design_probability)}</div>` : ''}

      <!-- Dates + value row -->
      <div style="margin-top:11px; padding-top:11px; border-top:1px solid var(--border); display:flex; flex-wrap:wrap; gap:18px;">
        <span style="font-size:10px; color:var(--light);">
          Opublikowano:&nbsp;<span style="color:var(--mid); font-weight:500;">${pub}</span>
        </span>
        <span style="font-size:10px; color:var(--light);">
          Termin składania:&nbsp;<span style="color:${soon ? '#b91c1c' : 'var(--mid)'}; font-weight:500;">${dl}</span>${soon ? '&ensp;<span style="font-size:9px; font-weight:600; color:#b91c1c; letter-spacing:0.1em; text-transform:uppercase;">&#x25B2;&nbsp;Wkrótce</span>' : ''}
        </span>
        ${t.value ? `<span style="font-size:10px; color:var(--light);">Szacowana wartość:&nbsp;<span style="color:var(--mid); font-weight:500;">${esc(t.value)}</span></span>` : ''}
      </div>

    </div>
    <div style="flex-shrink:0; padding-top:2px;">
      <a href="${esc(t.url)}" target="_blank" rel="noopener noreferrer" class="btn-open">
        Otwórz
        <svg width="9" height="9" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/>
        </svg>
      </a>
    </div>
  </div>
</article>`;
        }

        /* ── Utility functions ───────────────────────────── */
        function esc(str) {
            return String(str || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function hl(html, q) {
            if (!q) return html;
            const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return html.replace(re, '<mark>$1</mark>');
        }

        function fmtDate(iso) {
            try {
                return new Date(iso + 'T00:00:00').toLocaleDateString('pl-PL', {
                    year: 'numeric', month: 'short', day: 'numeric'
                });
            } catch { return iso; }
        }

        function fmtDateSidebar(iso) {
            try {
                return new Date(iso + 'T00:00:00').toLocaleDateString('pl-PL', {
                    weekday: 'short', year: 'numeric', month: 'short', day: 'numeric'
                });
            } catch { return iso; }
        }

        function deadlineSoon(iso) {
            try {
                const diffDays = (new Date(iso + 'T00:00:00') - Date.now()) / 86_400_000;
                return diffDays >= 0 && diffDays <= 7;
            } catch { return false; }
        }

        function pl(n) {
            if (n === 1) return '';
            if (n >= 2 && n <= 4) return 'i';
            return 'ów';
        }
    </script>

</body>

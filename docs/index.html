<!DOCTYPE html>
<html lang="pl" class="h-full bg-slate-100">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Przetargi Architektoniczne PL – Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] }
                }
            }
        };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        /* Tender card hover lift */
        .tender-card {
            transition: box-shadow 0.15s ease, transform 0.12s ease;
        }

        .tender-card:hover {
            transform: translateY(-1px);
        }

        /* Sidebar date items */
        .sidebar-item {
            transition: background 0.12s ease, color 0.12s ease;
        }

        .sidebar-item.active {
            background: rgba(99, 102, 241, 0.18);
            color: #a5b4fc;
            font-weight: 600;
        }

        .sidebar-item:not(.active):hover {
            background: rgba(255, 255, 255, 0.06);
            color: #e2e8f0;
        }

        /* Filter tabs */
        .filter-tab {
            transition: all 0.12s ease;
            cursor: pointer;
        }

        .filter-tab.active {
            background: #4f46e5;
            color: #fff;
            border-color: #4f46e5;
        }

        .filter-tab:not(.active):hover {
            background: #f1f5f9;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 9999px;
        }

        /* Loading spinner */
        @keyframes _spin {
            to {
                transform: rotate(360deg);
            }
        }

        .spin {
            animation: _spin 0.75s linear infinite;
        }

        /* Keyword highlight */
        mark {
            background: #fef9c3;
            color: #713f12;
            border-radius: 2px;
            padding: 0 2px;
        }
    </style>
</head>

<body class="h-full font-sans antialiased text-slate-800">
    <div id="app" class="flex h-screen overflow-hidden">

        <!-- ────────────────────────────────────────────────────────────
       SIDEBAR  (hidden on mobile, shown on lg+)
  ──────────────────────────────────────────────────────────────── -->
        <aside
            class="hidden lg:flex flex-col w-60 bg-slate-900 text-slate-300 shrink-0 overflow-hidden border-r border-slate-700/50">

            <!-- Brand -->
            <div class="px-5 py-4 border-b border-slate-700/60 shrink-0">
                <div class="flex items-center gap-2.5">
                    <span class="text-2xl leading-none select-none">🏗️</span>
                    <div class="leading-tight">
                        <p class="text-sm font-bold text-white">Przetargi PL</p>
                        <p class="text-xs text-slate-500">Architektura & Projekty</p>
                    </div>
                </div>
            </div>

            <!-- Report history label -->
            <p class="px-5 pt-4 pb-1 text-[10px] font-semibold text-slate-500 uppercase tracking-widest shrink-0">
                Historia Raportów
            </p>

            <!-- Scrollable date list – populated by JS -->
            <nav id="sidebar-nav" class="flex-1 overflow-y-auto px-2.5 pb-4 space-y-0.5">
            </nav>

            <!-- Footer -->
            <div class="px-5 py-3 border-t border-slate-700/60 shrink-0">
                <p class="text-[10px] text-slate-500">Wygenerowano:</p>
                <p class="text-xs text-slate-400">2026-06-24 08:47 UTC</p>
            </div>
        </aside>

        <!-- ────────────────────────────────────────────────────────────
       MAIN COLUMN
  ──────────────────────────────────────────────────────────────── -->
        <div class="flex-1 flex flex-col overflow-hidden min-w-0">

            <!-- Top header bar -->
            <header
                class="bg-white border-b border-slate-200 px-4 sm:px-6 py-3 flex items-center justify-between shrink-0 shadow-sm z-10">

                <div class="flex items-center gap-2.5 min-w-0">
                    <!-- Mobile brand icon -->
                    <span class="lg:hidden text-xl select-none shrink-0">🏗️</span>
                    <div class="min-w-0">
                        <span id="header-date" class="text-sm font-semibold text-slate-700 truncate block">
                            Raport: 2026-06-24
                        </span>
                        <span id="header-count" class="text-xs text-slate-400"></span>
                    </div>
                </div>

                <div class="flex items-center gap-2 shrink-0">
                    <!-- Mobile date selector -->
                    <select id="mobile-date-select"
                        class="lg:hidden border border-slate-300 rounded-lg text-xs px-2 py-1.5 bg-white text-slate-700 focus:outline-none focus:ring-2 focus:ring-indigo-400">
                    </select>

                    <!-- Search bar -->
                    <div class="relative">
                        <svg class="absolute left-2.5 top-1/2 -translate-y-1/2 w-3.5 h-3.5 text-slate-400 pointer-events-none"
                            fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M21 21l-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607z" />
                        </svg>
                        <input id="search-input" type="search" placeholder="Szukaj przetargu…" class="pl-8 pr-3 py-1.5 border border-slate-300 rounded-lg text-sm w-48 sm:w-60

            <!-- Stats strip -->

                    <button

            <!-- Scrollable content area -->
            <main class="flex-1 overflow-y-auto px-4 sm:px-6 py-5 bg-slate-50">

                <!-- Loading state -->

        </div><!-- /main column -->

    </div><!-- /app -->

    <!-- ──────────────────────────────────────────────────────────────
     JAVASCRIPT  – SPA logic
──────────────────────────────────────────────────────────────── -->
    <script>
        /* ── Embedded server-side data (injected by Jinja2) ─────────── */
        const MANIFEST = [{&#34;date&#34;: &#34;2026-06-24&#34;, &#34;file&#34;: &#34;reports/2026-06-24.json&#34;}];
        const INIT_REPORT = {&#34;date&#34;: &#34;2026-06-24&#34;, &#34;count&#34;: 13, &#34;generated_at&#34;: &#34;2026-06-24T08:47:52.536105+00:00&#34;, &#34;tenders&#34;: [{&#34;id&#34;: &#34;a1b2c3d4e5f60001&#34;, &#34;title&#34;: &#34;Projekt architektoniczny i wykonawczy centrum badawczo-rozwojowego KGHM Polska Miedz S.A. w Lubinie&#34;, &#34;entity&#34;: &#34;KGHM Polska Miedz S.A.&#34;, &#34;publication_date&#34;: &#34;2026-06-22&#34;, &#34;deadline&#34;: &#34;2026-07-28&#34;, &#34;url&#34;: &#34;https://ezamowienia.gov.pl/mp-client/search/list/ocds-148610-kghm-001&#34;, &#34;source&#34;: &#34;BZP (ezamowienia.gov.pl)&#34;, &#34;sector&#34;: &#34;soe&#34;}, {&#34;id&#34;: &#34;a1b2c3d4e5f60002&#34;, &#34;title&#34;: &#34;Dokumentacja projektowa budowlano-wykonawcza PGE Energetyka Kolejowa S.A.&#34;, &#34;entity&#34;: &#34;PGE Energetyka Kolejowa S.A.&#34;, &#34;publication_date&#34;: &#34;2026-06-21&#34;, &#34;deadline&#34;: &#34;2026-07-20&#34;, &#34;url&#34;: &#34;https://ezamowienia.gov.pl/mp-client/search/list/ocds-148610-pge-001&#34;, &#34;source&#34;: &#34;BZP (ezamowienia.gov.pl)&#34;, &#34;sector&#34;: &#34;soe&#34;}, {&#34;id&#34;: &#34;a1b2c3d4e5f60003&#34;, &#34;title&#34;: &#34;Projekt architektoniczny budynku biurowego PKP S.A. Warszawa Zachodnia&#34;, &#34;entity&#34;: &#34;PKP S.A. Centrum Realizacji Inwestycji&#34;, &#34;publication_date&#34;: &#34;2026-06-20&#34;, &#34;deadline&#34;: &#34;2026-07-15&#34;, &#34;url&#34;: &#34;https://platformazakupowa.pl/transakcje/123456&#34;, &#34;source&#34;: &#34;platformazakupowa.pl&#34;, &#34;sector&#34;: &#34;soe&#34;}, {&#34;id&#34;: &#34;a1b2c3d4e5f60004&#34;, &#34;title&#34;: &#34;Projekt wykonawczy hali magazynowo-logistycznej Tauron Dystrybucja&#34;, &#34;entity&#34;: &#34;Tauron Dystrybucja S.A.&#34;, &#34;publication_date&#34;: &#34;2026-06-19&#34;, &#34;deadline&#34;: &#34;2026-07-30&#34;, &#34;url&#34;: &#34;https://logintrade.net/rejestracja,oferty.html?id=789012&#34;, &#34;source&#34;: &#34;DuckDuckGo&#34;, &#34;sector&#34;: &#34;soe&#34;}, {&#34;id&#34;: &#34;a1b2c3d4e5f60005&#34;, &#34;title&#34;: &#34;Dokumentacja projektowa budynek uzytecznosci publicznej Urzad Miejski Wroclaw&#34;, &#34;entity&#34;: &#34;Gmina Wroclaw Urzad Miejski&#34;, &#34;publication_date&#34;: &#34;2026-06-23&#34;, &#34;deadline&#34;: &#34;2026-08-01&#34;, &#34;url&#34;: &#34;https://ezamowienia.gov.pl/mp-client/search/list/ocds-148610-wroc-001&#34;, &#34;source&#34;: &#34;BZP (ezamowienia.gov.pl)&#34;, &#34;sector&#34;: &#34;public&#34;}, {&#34;id&#34;: &#34;a1b2c3d4e5f60006&#34;, &#34;title&#34;: &#34;Projekt architektoniczny rozbudowy Szpitala Uniwersyteckiego w Krakowie&#34;, &#34;entity&#34;: &#34;Szpital Uniwersytecki w Krakowie&#34;, &#34;publication_date&#34;: &#34;2026-06-21&#34;, &#34;deadline&#34;: &#34;2026-07-25&#34;, &#34;url&#34;: &#34;https://ezamowienia.gov.pl/mp-client/search/list/ocds-148610-krak-001&#34;, &#34;source&#34;: &#34;BZP (ezamowienia.gov.pl)&#34;, &#34;sector&#34;: &#34;public&#34;}, {&#34;id&#34;: &#34;a1b2c3d4e5f60007&#34;, &#34;title&#34;: &#34;Projekt budowlano-wykonawczy biblioteki miejskiej Miasto Gdansk&#34;, &#34;entity&#34;: &#34;Gmina Miasto Gdansk&#34;, &#34;publication_date&#34;: &#34;2026-06-18&#34;, &#34;deadline&#34;: &#34;2026-07-22&#34;, &#34;url&#34;: &#34;https://ezamowienia.gov.pl/mp-client/search/list/ocds-148610-gdansk-001&#34;, &#34;source&#34;: &#34;BZP (ezamowienia.gov.pl)&#34;, &#34;sector&#34;: &#34;public&#34;}, {&#34;id&#34;: &#34;a1b2c3d4e5f60008&#34;, &#34;title&#34;: &#34;Dokumentacja projektowa budynek Starostwa Powiatowego w Poznaniu&#34;, &#34;entity&#34;: &#34;Starostwo Powiatowe w Poznaniu&#34;, &#34;publication_date&#34;: &#34;2026-06-17&#34;, &#34;deadline&#34;: null, &#34;url&#34;: &#34;https://ezamowienia.gov.pl/mp-client/search/list/ocds-148610-poznan-001&#34;, &#34;source&#34;: &#34;BZP (ezamowienia.gov.pl)&#34;, &#34;sector&#34;: &#34;public&#34;}, {&#34;id&#34;: &#34;a1b2c3d4e5f60009&#34;, &#34;title&#34;: &#34;Projekt architektoniczny hali produkcyjno-magazynowej centrum logistyczne Lodz&#34;, &#34;entity&#34;: &#34;Panattoni Development Europe Sp. z o.o.&#34;, &#34;publication_date&#34;: &#34;2026-06-22&#34;, &#34;deadline&#34;: &#34;2026-08-05&#34;, &#34;url&#34;: &#34;https://platformazakupowa.pl/transakcje/234567&#34;, &#34;source&#34;: &#34;platformazakupowa.pl&#34;, &#34;sector&#34;: &#34;industrial&#34;}, {&#34;id&#34;: &#34;a1b2c3d4e5f60010&#34;, &#34;title&#34;: &#34;Projekt wykonawczy hali przemyslowej zaklad produkcji Katowice&#34;, &#34;entity&#34;: &#34;Skanska S.A.&#34;, &#34;publication_date&#34;: &#34;2026-06-20&#34;, &#34;deadline&#34;: &#34;2026-07-18&#34;, &#34;url&#34;: &#34;https://logintrade.net/rejestracja,oferty.html?id=567890&#34;, &#34;source&#34;: &#34;DuckDuckGo&#34;, &#34;sector&#34;: &#34;industrial&#34;}, {&#34;id&#34;: &#34;a1b2c3d4e5f60011&#34;, &#34;title&#34;: &#34;Dokumentacja projektowa centrum dystrybucji Poczta Polska S.A.&#34;, &#34;entity&#34;: &#34;Poczta Polska S.A.&#34;, &#34;publication_date&#34;: &#34;2026-06-19&#34;, &#34;deadline&#34;: &#34;2026-07-31&#34;, &#34;url&#34;: &#34;https://ted.europa.eu/en/notice/345678-2026&#34;, &#34;source&#34;: &#34;TED (EU)&#34;, &#34;sector&#34;: &#34;soe&#34;}, {&#34;id&#34;: &#34;a1b2c3d4e5f60012&#34;, &#34;title&#34;: &#34;Projekt architektoniczny modernizacji budynku Orlen S.A. Plock&#34;, &#34;entity&#34;: &#34;PKN Orlen S.A.&#34;, &#34;publication_date&#34;: &#34;2026-06-16&#34;, &#34;deadline&#34;: &#34;2026-07-14&#34;, &#34;url&#34;: &#34;https://ted.europa.eu/en/notice/456789-2026&#34;, &#34;source&#34;: &#34;TED (EU)&#34;, &#34;sector&#34;: &#34;soe&#34;}, {&#34;id&#34;: &#34;a1b2c3d4e5f60013&#34;, &#34;title&#34;: &#34;Projekt budowlany i wykonawczy muzeum regionalnego MKiDN&#34;, &#34;entity&#34;: &#34;Ministerstwo Kultury i Dziedzictwa Narodowego&#34;, &#34;publication_date&#34;: &#34;2026-06-15&#34;, &#34;deadline&#34;: &#34;2026-07-20&#34;, &#34;url&#34;: &#34;https://ezamowienia.gov.pl/mp-client/search/list/ocds-148610-mkidn-001&#34;, &#34;source&#34;: &#34;BZP (ezamowienia.gov.pl)&#34;, &#34;sector&#34;: &#34;public&#34;}]};

        /* ── App state ───────────────────────────────────────────────── */
        let activeTenders = INIT_REPORT.tenders || [];
        let activeFilter = 'all';
        let searchQuery = '';

        /* ── DOM refs ────────────────────────────────────────────────── */
        const $ = id => document.getElementById(id);
        const sidebarNav = $('sidebar-nav');
        const mobileSelect = $('mobile-date-select');
        const searchInput = $('search-input');
        const tendersContainer = $('tenders-container');
        const loadingState = $('loading-state');
        const emptyState = $('empty-state');

        /* ── Bootstrap ───────────────────────────────────────────────── */
        document.addEventListener('DOMContentLoaded', () => {
            buildSidebar();
            buildMobileSelect();
            bindFilterTabs();

            searchInput.addEventListener('input', e => {
                searchQuery = e.target.value.trim().toLowerCase();
                renderTenders();
            });
            mobileSelect.addEventListener('change', e => loadReport(e.target.value));

            renderAll();
        });

        /* ── Sidebar date list ───────────────────────────────────────── */
        function buildSidebar() {
            MANIFEST.forEach((item, i) => {
                const btn = document.createElement('button');
                btn.className = `sidebar-item w-full text-left px-3 py-2 rounded-lg text-xs mt-0.5 ${i === 0 ? 'active' : 'text-slate-400'
                    }`;
                btn.textContent = fmtDateSidebar(item.date);
                btn.dataset.file = item.file;
                btn.addEventListener('click', () => loadReport(item.file));
                sidebarNav.appendChild(btn);
            });
        }

        /* ── Mobile date <select> ────────────────────────────────────── */
        function buildMobileSelect() {
            MANIFEST.forEach((item, i) => {
                const opt = new Option(item.date, item.file, i === 0, i === 0);
                mobileSelect.appendChild(opt);
            });
        }

        /* ── Sector filter tabs ──────────────────────────────────────── */
        function bindFilterTabs() {
            document.querySelectorAll('.filter-tab').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    activeFilter = btn.dataset.sector;
                    renderTenders();
                });
            });
        }

        /* ── Async report loader ─────────────────────────────────────── */
        async function loadReport(file) {
            // Update sidebar highlight
            document.querySelectorAll('.sidebar-item').forEach(btn => {
                const yes = btn.dataset.file === file;
                btn.classList.toggle('active', yes);
                btn.classList.toggle('text-slate-400', !yes);
            });
            mobileSelect.value = file;

            // Show loading
            loadingState.classList.remove('hidden');
            loadingState.classList.add('flex');
            tendersContainer.innerHTML = '';
            emptyState.classList.add('hidden');

            try {
                const resp = await fetch(file);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
                const report = await resp.json();
                activeTenders = report.tenders || [];
                $('header-date').textContent = `Raport: ${report.date}`;
                renderAll();
            } catch (err) {
                console.error('Failed to load report:', err);
                tendersContainer.innerHTML =
                    `<div class="text-center text-sm text-red-500 py-10">Błąd ładowania raportu. Sprawdź konsolę.</div>`;
            } finally {
                loadingState.classList.add('hidden');
                loadingState.classList.remove('flex');
            }
        }

        /* ── Render pipeline ─────────────────────────────────────────── */
        function renderAll() {
            updateStats();
            renderTenders();
        }

        function updateStats() {
            const c = { all: 0, public: 0, industrial: 0, soe: 0, other: 0 };
            activeTenders.forEach(t => {
                c.all++;
                const s = t.sector || 'other';
                c[s] = (c[s] || 0) + 1;
            });
            $('stat-all').textContent = c.all;
            $('stat-public').textContent = c.public || 0;
            $('stat-industrial').textContent = c.industrial || 0;
            $('stat-soe').textContent = c.soe || 0;

            $('tab-all').textContent = `(${c.all})`;
            $('tab-public').textContent = `(${c.public || 0})`;
            $('tab-industrial').textContent = `(${c.industrial || 0})`;
            $('tab-soe').textContent = `(${c.soe || 0})`;
            $('tab-other').textContent = `(${c.other || 0})`;
        }

        function filteredTenders() {
            return activeTenders.filter(t => {
                if (activeFilter !== 'all' && (t.sector || 'other') !== activeFilter) return false;
                if (searchQuery) {
                    const hay = `${t.title || ''} ${t.entity || ''}`.toLowerCase();
                    if (!hay.includes(searchQuery)) return false;
                }
                return true;
            });
        }

        function renderTenders() {
            const list = filteredTenders();
            $('header-count').textContent = `${list.length} wynik${pl(list.length)}`;

            if (list.length === 0) {
                tendersContainer.innerHTML = '';
                emptyState.classList.remove('hidden');
                emptyState.classList.add('flex');
                return;
            }
            emptyState.classList.add('hidden');
            emptyState.classList.remove('flex');
            tendersContainer.innerHTML = list.map(tenderCard).join('');
        }

        /* ── Sector display config ───────────────────────────────────── */
        const SECTORS = {
            public: { label: 'Publiczny', border: 'border-l-blue-500', badge: 'bg-blue-100 text-blue-800', icon: '🏛' },
            industrial: { label: 'Przemysłowy', border: 'border-l-amber-400', badge: 'bg-amber-100 text-amber-800', icon: '🏭' },
            soe: { label: 'SSP', border: 'border-l-purple-500', badge: 'bg-purple-100 text-purple-800', icon: '🏢' },
            other: { label: 'Inne', border: 'border-l-slate-300', badge: 'bg-slate-100 text-slate-600', icon: '📋' },
        };

        /* ── Single tender card HTML ─────────────────────────────────── */
        function tenderCard(t) {
            const s = SECTORS[t.sector] || SECTORS.other;
            const pub = t.publication_date ? fmtDate(t.publication_date) : '—';
            const dl = t.deadline ? fmtDate(t.deadline) : '—';
            const dlCls = t.deadline && deadlineSoon(t.deadline)
                ? 'text-red-600 font-semibold'
                : 'text-slate-600';

            const titleHtml = hl(esc(t.title || 'Brak tytułu'), searchQuery);
            const entityHtml = hl(esc(t.entity || '—'), searchQuery);
            const sourceHtml = esc(t.source || '—');

            return `
<article class="tender-card bg-white rounded-xl border border-slate-200 border-l-4 ${s.border} shadow-sm hover:shadow-md px-5 py-4">
  <div class="flex flex-col sm:flex-row sm:items-start gap-4">

    <div class="flex-1 min-w-0">
      <!-- Badges row -->
      <div class="flex flex-wrap gap-1.5 mb-2">
        <span class="inline-flex items-center gap-1 text-xs font-medium px-2 py-0.5 rounded-full ${s.badge}">
          ${s.icon} ${s.label}
        </span>
        <span class="inline-flex items-center text-xs font-medium px-2 py-0.5 rounded-full bg-slate-100 text-slate-600">
          ${sourceHtml}
        </span>
      </div>

      <!-- Title -->
      <h3 class="text-sm font-semibold text-slate-900 leading-snug mb-1 break-words">${titleHtml}</h3>

      <!-- Entity -->
      <p class="text-xs text-slate-500">
        <span class="font-medium text-slate-700">Zamawiający:</span>
        <span class="ml-1">${entityHtml}</span>
      </p>

      <!-- Dates row -->
      <div class="mt-2.5 pt-2.5 border-t border-slate-100 flex flex-wrap gap-4 text-xs">
        <span class="text-slate-500">
          📅 Opublikowano:
          <span class="text-slate-700 font-medium">${pub}</span>
        </span>
        <span class="text-slate-500">
          ⏰ Termin składania:
          <span class="${dlCls} font-medium">${dl}</span>
          ${t.deadline && deadlineSoon(t.deadline) ? '<span class="ml-1 text-red-500 font-semibold">Wkrótce!</span>' : ''}
        </span>
      </div>
    </div>

    <!-- CTA -->
    <div class="shrink-0 flex sm:flex-col items-center sm:items-end">
      <a href="${esc(t.url)}" target="_blank" rel="noopener noreferrer"
         class="inline-flex items-center gap-1.5 px-3.5 py-2 bg-indigo-600 text-white text-xs
                font-semibold rounded-lg hover:bg-indigo-700 active:bg-indigo-800 transition-colors
                whitespace-nowrap shadow-sm">
        Otwórz
        <svg class="w-3 h-3 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/>
        </svg>
      </a>
    </div>

  </div>
</article>`;
        }

        /* ── Utility functions ───────────────────────────────────────── */

        /** HTML-escape a plain string */
        function esc(str) {
            return String(str || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        /** Wrap search query matches in <mark> */
        function hl(html, q) {
            if (!q) return html;
            const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return html.replace(re, '<mark>$1</mark>');
        }

        /** ISO date → Polish short format */
        function fmtDate(iso) {
            try {
                return new Date(iso + 'T00:00:00').toLocaleDateString('pl-PL', {
                    year: 'numeric', month: 'short', day: 'numeric'
                });
            } catch { return iso; }
        }

        /** ISO date → sidebar format with weekday */
        function fmtDateSidebar(iso) {
            try {
                return new Date(iso + 'T00:00:00').toLocaleDateString('pl-PL', {
                    weekday: 'short', year: 'numeric', month: 'short', day: 'numeric'
                });
            } catch { return iso; }
        }

        /** True if deadline is within 7 days from now */
        function deadlineSoon(iso) {
            try {
                const diffDays = (new Date(iso + 'T00:00:00') - Date.now()) / 86_400_000;
                return diffDays >= 0 && diffDays <= 7;
            } catch { return false; }
        }

        /** Polish plural suffix helper for "wynik / wyniki / wyników" */
        function pl(n) {
            if (n === 1) return '';
            if (n >= 2 && n <= 4) return 'i';
            return 'ów';
        }
    </script>
</body>

</html>

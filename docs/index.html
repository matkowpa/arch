<!DOCTYPE html>
<html lang="pl" class="h-full">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Przetargi Architektoniczne PL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
    <style>
        :root {
            --dark:    #1a1818;
            --mid:     #5a524a;
            --light:   #9a908a;
            --paper:   #f5f2ed;
            --border:  #e0dbd2;
            --white:   #ffffff;
            --c-public:     #4a7ab5;
            --c-industrial: #b8743a;
            --c-soe:        #7c5cbf;
            --c-other:      #9a908a;
        }

        html, body { height: 100%; margin: 0; }

        body {
            font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
            background: var(--paper);
            color: var(--dark);
            -webkit-font-smoothing: antialiased;
        }

        .font-display { font-family: 'Cormorant Garamond', Georgia, serif; }

        /* Tender card */
        .tender-card { transition: box-shadow 0.15s ease; }
        .tender-card:hover { box-shadow: 0 6px 28px rgba(26,24,24,0.09); }

        /* Sector left border */
        .sector-public     { border-left: 3px solid var(--c-public); }
        .sector-industrial { border-left: 3px solid var(--c-industrial); }
        .sector-soe        { border-left: 3px solid var(--c-soe); }
        .sector-other      { border-left: 3px solid var(--c-other); }

        /* Sidebar date items */
        .sidebar-item {
            display: block; width: 100%; text-align: left;
            padding: 7px 10px; font-size: 11px; letter-spacing: 0.04em;
            margin-bottom: 2px; border: none; background: none;
            transition: background 0.12s ease, color 0.12s ease;
            color: var(--mid); cursor: pointer;
        }
        .sidebar-item.active  { background: var(--dark); color: var(--white); }
        .sidebar-item:not(.active):hover { background: var(--border); color: var(--dark); }

        /* Filter tabs */
        .filter-tab {
            cursor: pointer; border: none; background: none;
            padding: 0 0 12px 0; font-size: 10px; font-weight: 600;
            letter-spacing: 0.14em; text-transform: uppercase;
            border-bottom: 2px solid transparent;
            transition: color 0.12s ease, border-color 0.12s ease;
            color: var(--light); white-space: nowrap;
        }
        .filter-tab.active { color: var(--dark); border-bottom-color: var(--dark); }
        .filter-tab:not(.active):hover { color: var(--mid); }

        /* CTA outlined button */
        .btn-open {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 7px 14px; border: 1px solid var(--dark);
            color: var(--dark); font-size: 10px; font-weight: 600;
            letter-spacing: 0.1em; text-transform: uppercase;
            text-decoration: none; white-space: nowrap; flex-shrink: 0;
            transition: background 0.12s ease, color 0.12s ease;
        }
        .btn-open:hover { background: var(--dark); color: var(--white); }

        /* Loading spinner */
        @keyframes _spin { to { transform: rotate(360deg); } }
        .spin { animation: _spin 0.75s linear infinite; }

        /* Keyword highlight */
        mark { background: #ede3cf; color: var(--dark); border-radius: 1px; padding: 0 1px; }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 3px; height: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 9999px; }

        /* Search */
        #search-input::placeholder { color: rgba(255,255,255,0.3); }
        #search-input:focus { outline: none; border-color: rgba(255,255,255,0.4) !important; }

        /* Responsive */
        @media (max-width: 1023px) { .sidebar-hide { display: none !important; } }
        @media (min-width: 640px)  { .sm-show { display: block !important; } }
        @media (min-width: 1024px) { .lg-hide { display: none !important; } }
    </style>
</head>

<body class="h-full">
<div id="app" style="display:flex; flex-direction:column; height:100vh; overflow:hidden;">

    const INIT_REPORT = {&#34;date&#34;: &#34;2026-06-24&#34;, &#34;count&#34;: 13, &#34;generated_at&#34;: &#34;2026-06-24T08:42:37.071173+00:00&#34;, &#34;tenders&#34;: [{&#34;id&#34;: &#34;a1b2c3d4e5f60001&#34;, &#34;title&#34;: &#34;Projekt architektoniczny i wykonawczy centrum badawczo-rozwojowego KGHM Polska Miedz S.A. w Lubinie&#34;, &#34;entity&#34;: &#34;KGHM Polska Miedz S.A.&#34;, &#34;publication_date&#34;: &#34;2026-06-22&#34;, &#34;deadline&#34;: &#34;2026-07-28&#34;, &#34;url&#34;: &#34;https://ezamowienia.gov.pl/mp-client/search/list/ocds-148610-kghm-001&#34;, &#34;source&#34;: &#34;BZP (ezamowienia.gov.pl)&#34;, &#34;sector&#34;: &#34;soe&#34;}, {&#34;id&#34;: &#34;a1b2c3d4e5f60002&#34;, &#34;title&#34;: &#34;Dokumentacja projektowa budowlano-wykonawcza PGE Energetyka Kolejowa S.A.&#34;, &#34;entity&#34;: &#34;PGE Energetyka Kolejowa S.A.&#34;, &#34;publication_date&#34;: &#34;2026-06-21&#34;, &#34;deadline&#34;: &#34;2026-07-20&#34;, &#34;url&#34;: &#34;https://ezamowienia.gov.pl/mp-client/search/list/ocds-148610-pge-001&#34;, &#34;source&#34;: &#34;BZP (ezamowienia.gov.pl)&#34;, &#34;sector&#34;: &#34;soe&#34;}, {&#34;id&#34;: &#34;a1b2c3d4e5f60003&#34;, &#34;title&#34;: &#34;Projekt architektoniczny budynku biurowego PKP S.A. Warszawa Zachodnia&#34;, &#34;entity&#34;: &#34;PKP S.A. Centrum Realizacji Inwestycji&#34;, &#34;publication_date&#34;: &#34;2026-06-20&#34;, &#34;deadline&#34;: &#34;2026-07-15&#34;, &#34;url&#34;: &#34;https://platformazakupowa.pl/transakcje/123456&#34;, &#34;source&#34;: &#34;platformazakupowa.pl&#34;, &#34;sector&#34;: &#34;soe&#34;}, {&#34;id&#34;: &#34;a1b2c3d4e5f60004&#34;, &#34;title&#34;: &#34;Projekt wykonawczy hali magazynowo-logistycznej Tauron Dystrybucja&#34;, &#34;entity&#34;: &#34;Tauron Dystrybucja S.A.&#34;, &#34;publication_date&#34;: &#34;2026-06-19&#34;, &#34;deadline&#34;: &#34;2026-07-30&#34;, &#34;url&#34;: &#34;https://logintrade.net/rejestracja,oferty.html?id=789012&#34;, &#34;source&#34;: &#34;Duc ;: &#34;Projekt architektoniczny hali produkcyjno-magazynowej centrum logistyczne Lodz&#34;, &#34;entity&#34;: &#34;Panattoni Development Europe Sp. z o.o.&#34;, &#34;publication_date&#34;: &#34;2026-06-22&#34;, &#34;deadline&#34;: &#34;2026-08-05&#34;, &#34;url&#34;: &#34;https://platformazakupowa.pl/transakcje/234567&#34;, &#34;source&#34;: &#34;platformazakupowa.pl&#34;, &#34;sector&#34;: &#34;industrial&#34;}, {&#34;id&#34;: &#34;a1b2c3d4e5f60010&#34;, &#34;title&#34;: &#34;Projekt wykonawczy hali przemyslowej zaklad produkcji Katowice&#34;, &#34;entity&#34;: &#34;Skanska S.A.&#34;, &#34;publication_date&#34;: &#34;2026-06-20&#34;, &#34;deadline&#34;: &#34;2026-07-18&#34;, &#34;url&#34;: &#34;https://logintrade.net/rejestracja,oferty.html?id=567890&#34;, &#34;source&#34;: &#34;DuckDuckGo&#34;, &#34;sector&#34;: &#34;industrial&#34;}, {&#34;id&#34;: &#34;a1b2c3d4e5f60011&#34;, &#34;title&#34;: &#34;Dokumentacja projektowa centrum dystrybucji Poczta Polska S.A.&#34;, &#34;entity&#34;: &#34;Poczta Polska S.A.&#34;, &#34;publication_date&#34;: &#34;2026-06-19&#34;, &#34;deadline&#34;: &#34;2026-07-31&#34;, &#34;url&#34;: &#34;https://ted.europa.eu/en/notice/345678-2026&#34;, &#34;source&#34;: &#34;TED (EU)&#34;, &#34;sector&#34;: &#34;soe&#34;}, {&#34;id&#34;: &#34;a1b2c3d4e5f60012&#34;, &#34;title&#34;: &#34;Projekt architektoniczny modernizacji budynku Orlen S.A. Plock&#34;, &#34;entity&#34;: &#34;PKN Orlen S.A.&#34;, &#34;publication_date&#34;: &#34;2026-06-16&#34;, &#34;deadline&#34;: &#34;2026-07-14&#34;, &#34;url&#34;: &#34;https://ted.europa.eu/en/notice/456789-2026&#34;, &#34;source&#34;: &#34;TED (EU)&#34;, &#34;sector&#34;: &#34;soe&#34;}, {&#34;id&#34;: &#34;a1b2c3d4e5f60013&#34;, &#34;title&#34;: &#34;Projekt budowlany i wykonawczy muzeum regionalnego MKiDN&#34;, &#34;entity&#34;: &#34;Ministerstwo Kultury i Dziedzictwa Narodowego&#34;, &#34;publication_date&#34;: &#34;2026-06-15&#34;, &#34;deadline&#34;: &#34;2026-07-20&#34;, &#34;url&#34;: &#34;https://ezamowienia.gov.pl/mp-client/search/list/ocds-148610-mkidn-001&#34;, &#34;source&#34;: &#34;BZP (ezamowienia.gov.pl)&#34;, &#34;sector&#34;: &#34;public&#34;}]};

    /* ── App state ───────────────────────────────────── */
    let activeTenders = INIT_REPORT.tenders || [];
    let activeFilter  = 'all';
    let searchQuery   = '';

    /* ── DOM refs ────────────────────────────────────── */
    const $ = id => document.getElementById(id);
    const sidebarNav       = $('sidebar-nav');
    const mobileSelect     = $('mobile-date-select');
    const searchInput      = $('search-input');
    const tendersContainer = $('tenders-container');
    const loadingState     = $('loading-state');
    const emptyState       = $('empty-state');

    /* ── Bootstrap ───────────────────────────────────── */
    document.addEventListener('DOMContentLoaded', () => {
        buildSidebar();
        buildMobileSelect();
        bindFilterTabs();
        searchInput.addEventListener('input', e => {
            searchQuery = e.target.value.trim().toLowerCase();
            renderTenders();
        });
        mobileSelect.addEventListener('change', e => loadReport(e.target.value));
        renderAll();
    });

    /* ── Sidebar ─────────────────────────────────────── */
    function buildSidebar() {
        MANIFEST.forEach((item, i) => {
            const btn = document.createElement('button');
            btn.className = `sidebar-item${i === 0 ? ' active' : ''}`;
            btn.textContent = fmtDateSidebar(item.date);
            btn.dataset.file = item.file;
            btn.addEventListener('click', () => loadReport(item.file));
            sidebarNav.appendChild(btn);
        });
    }

    /* ── Mobile <select> ─────────────────────────────── */
    function buildMobileSelect() {
        MANIFEST.forEach((item, i) => {
            const opt = new Option(item.date, item.file, i === 0, i === 0);
            mobileSelect.appendChild(opt);
        });
    }

    /* ── Filter tabs ─────────────────────────────────── */
    function bindFilterTabs() {
        document.querySelectorAll('.filter-tab').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                activeFilter = btn.dataset.sector;
                renderTenders();
            });
        });
    }

    /* ── Async report loader ─────────────────────────── */
    async function loadReport(file) {
        document.querySelectorAll('.sidebar-item').forEach(btn => {
            btn.classList.toggle('active', btn.dataset.file === file);
        });
        mobileSelect.value = file;

        loadingState.style.display = 'flex';
        tendersContainer.innerHTML = '';
        emptyState.style.display   = 'none';

        try {
            const resp = await fetch(file);
            if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
            const report = await resp.json();
            activeTenders = report.tenders || [];
            $('header-date').textContent = `Raport: ${report.date}`;
            renderAll();
        } catch (err) {
            console.error('Failed to load report:', err);
            tendersContainer.innerHTML =
                `<div style="text-align:center;font-size:12px;color:#b91c1c;padding:40px 0;">Błąd ładowania raportu.</div>`;
        } finally {
            loadingState.style.display = 'none';
        }
    }

    /* ── Render pipeline ─────────────────────────────── */
    function renderAll() { updateStats(); renderTenders(); }

    function updateStats() {
        const c = { all: 0, public: 0, industrial: 0, soe: 0, other: 0 };
        activeTenders.forEach(t => {
            c.all++;
            const s = t.sector || 'other';
            c[s] = (c[s] || 0) + 1;
        });
        $('stat-all').textContent        = c.all;
        $('stat-public').textContent     = c.public || 0;
        $('stat-industrial').textContent = c.industrial || 0;
        $('stat-soe').textContent        = c.soe || 0;

        $('tab-all').textContent        = `(${c.all})`;
        $('tab-public').textContent     = `(${c.public || 0})`;
        $('tab-industrial').textContent = `(${c.industrial || 0})`;
        $('tab-soe').textContent        = `(${c.soe || 0})`;
        $('tab-other').textContent      = `(${c.other || 0})`;
    }

    function filteredTenders() {
        return activeTenders.filter(t => {
            if (activeFilter !== 'all' && (t.sector || 'other') !== activeFilter) return false;
            if (searchQuery) {
                const hay = `${t.title || ''} ${t.entity || ''}`.toLowerCase();
                if (!hay.includes(searchQuery)) return false;
            }
            return true;
        });
    }

    function renderTenders() {
        const list = filteredTenders();
        $('header-count').textContent = `${list.length} wynik${pl(list.length)}`;

        if (list.length === 0) {
            tendersContainer.innerHTML = '';
            emptyState.style.display   = 'flex';
            return;
        }
        emptyState.style.display   = 'none';
        tendersContainer.innerHTML = list.map(tenderCard).join('');
    }

    /* ── Sector config ───────────────────────────────── */
    const SECTORS = {
        public:     { label: 'Publiczny',   cls: 'sector-public',     color: 'var(--c-public)' },
        industrial: { label: 'Przemysłowy', cls: 'sector-industrial', color: 'var(--c-industrial)' },
        soe:        { label: 'SSP',         cls: 'sector-soe',        color: 'var(--c-soe)' },
        other:      { label: 'Inne',        cls: 'sector-other',      color: 'var(--c-other)' },
    };

    /* ── Single tender card ──────────────────────────── */
    function tenderCard(t) {
        const s    = SECTORS[t.sector] || SECTORS.other;
        const pub  = t.publication_date ? fmtDate(t.publication_date) : '—';
        const dl   = t.deadline ? fmtDate(t.deadline) : '—';
        const soon = t.deadline && deadlineSoon(t.deadline);

        const titleHtml  = hl(esc(t.title  || 'Brak tytułu'), searchQuery);
        const entityHtml = hl(esc(t.entity || '—'),           searchQuery);
        const sourceText = esc(t.source || '—');

        return `
<article class="tender-card ${s.cls}" style="background:var(--white); padding:18px 22px 16px 20px;">
  <div style="display:flex; align-items:flex-start; gap:20px;">
    <div style="flex:1; min-width:0;">
      <div style="display:flex; align-items:center; gap:14px; margin-bottom:9px;">
        <span style="display:inline-flex; align-items:center; gap:5px; font-size:9px; font-weight:600; letter-spacing:0.14em; text-transform:uppercase; color:${s.color};">
          <span style="width:5px; height:5px; border-radius:50%; background:${s.color}; flex-shrink:0; display:inline-block;"></span>
          ${s.label}
        </span>
        <span style="font-size:9px; color:var(--light); letter-spacing:0.08em; text-transform:uppercase;">${sourceText}</span>
      </div>
      <h3 style="font-size:14px; font-weight:500; color:var(--dark); line-height:1.5; margin:0 0 6px; word-break:break-word;">${titleHtml}</h3>
      <p style="font-size:11px; color:var(--mid); margin:0;">
        <span style="font-weight:500;">Zamawiający:</span>
        <span style="margin-left:4px;">${entityHtml}</span>
      </p>
      <div style="margin-top:11px; padding-top:11px; border-top:1px solid var(--border); display:flex; flex-wrap:wrap; gap:18px;">
        <span style="font-size:10px; color:var(--light);">
          Opublikowano:&nbsp;<span style="color:var(--mid); font-weight:500;">${pub}</span>
        </span>
        <span style="font-size:10px; color:var(--light);">
          Termin składania:&nbsp;<span style="color:${soon ? '#b91c1c' : 'var(--mid)'}; font-weight:500;">${dl}</span>${soon ? '&ensp;<span style="font-size:9px; font-weight:600; color:#b91c1c; letter-spacing:0.1em; text-transform:uppercase;">&#x25B2;&nbsp;Wkrótce</span>' : ''}
        </span>
      </div>
    </div>
    <div style="flex-shrink:0; padding-top:2px;">
      <a href="${esc(t.url)}" target="_blank" rel="noopener noreferrer" class="btn-open">
        Otwórz
        <svg width="9" height="9" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round"
                d="M13.5 6H5.25A2.25 2.25 0 0 0 3 8.25v10.5A2.25 2.25 0 0 0 5.25 21h10.5A2.25 2.25 0 0 0 18 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/>
        </svg>
      </a>
    </div>
  </div>
</article>`;
    }

    /* ── Utility functions ───────────────────────────── */
    function esc(str) {
        return String(str || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function hl(html, q) {
        if (!q) return html;
        const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
        return html.replace(re, '<mark>$1</mark>');
    }

    function fmtDate(iso) {
        try {
            return new Date(iso + 'T00:00:00').toLocaleDateString('pl-PL', {
                year: 'numeric', month: 'short', day: 'numeric'
            });
        } catch { return iso; }
    }

    function fmtDateSidebar(iso) {
        try {
            return new Date(iso + 'T00:00:00').toLocaleDateString('pl-PL', {
                weekday: 'short', year: 'numeric', month: 'short', day: 'numeric'
            });
        } catch { return iso; }
    }

    function deadlineSoon(iso) {
        try {
            const diffDays = (new Date(iso + 'T00:00:00') - Date.now()) / 86_400_000;
            return diffDays >= 0 && diffDays <= 7;
        } catch { return false; }
    }

    function pl(n) {
        if (n === 1) return '';
        if (n >= 2 && n <= 4) return 'i';
        return 'ów';
    }
</script>

</body>
</html>
